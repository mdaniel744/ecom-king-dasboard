<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf6ec;
        color: #2b2118;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
      }
      .card {
        max-width: 360px;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #6b5d4f;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      button {
        margin-top: 1.25rem;
        background: #d97706;
        color: white;
        border: none;
        padding: 0.6rem 1.25rem;
        border-radius: 0.5rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        This page hasn't been loaded before, so it isn't available without an
        internet connection. Pages you've already visited will still work.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
